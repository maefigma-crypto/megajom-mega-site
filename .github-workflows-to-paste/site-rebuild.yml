name: Site Rebuild (6h Bukti Cuci Refresh)

on:
  schedule:
    # 4× per day at 2am / 8am / 2pm / 8pm MYT (UTC+8 → 18 / 0 / 6 / 12 UTC)
    - cron: '0 18,0,6,12 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: site-rebuild
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update build date + slot
        run: node scripts/daily-rebuild.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/build-date.json; then
            echo "No change — skipping commit"
          else
            git add data/build-date.json
            git commit -m "chore(build): 6h refresh for Bukti Cuci rotation"
            git push
          fi
