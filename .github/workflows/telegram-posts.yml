name: Telegram Auto-Posting (manual only)

on:
  workflow_dispatch:
    inputs:
      post_type:
        description: 'Which post to send now'
        required: true
        default: 'bukti-cuci'
        type: choice
        options:
          - bukti-cuci
          - game-tips
          - withdrawal-proof

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Send Telegram post
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          MONEY_SITE_URL: ${{ secrets.MONEY_SITE_URL }}
          GAME_TIPS_URL: ${{ secrets.GAME_TIPS_URL }}
        run: node scripts/telegram/post-${{ github.event.inputs.post_type }}.mjs
