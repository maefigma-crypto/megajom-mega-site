name: Daily Rebuild (Bukti Cuci Refresh)

on:
  schedule:
    # 16:00 UTC = 00:00 MYT (UTC+8) — midnight MY time every day
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-rebuild
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update build date
        run: node scripts/daily-rebuild.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/build-date.json; then
            echo "No date change — skipping commit"
          else
            git add data/build-date.json
            git commit -m "chore(build): daily refresh for Bukti Cuci rotation"
            git push
          fi
